<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Luxe Bags</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #fafafa; color: #333; }header {
  background: linear-gradient(135deg, #111, #333);
  color: white;
  padding: 30px 20px;
  text-align: center;
}

header h1 { font-size: 28px; }
header p { font-size: 14px; opacity: 0.8; }

.container { padding: 20px; max-width: 1100px; margin: auto; }

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card h3 { font-size: 16px; margin-bottom: 5px; }
.price { font-weight: 600; margin: 8px 0; }

.btn {
  display: block;
  text-align: center;
  background: #25D366;
  color: white;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.2s;
}

.btn:hover { background: #1ebe5d; }

footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #777;
}

.badge {
  display: inline-block;
  background: #000;
  color: white;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 20px;
  margin-bottom: 8px;
}

  </style>
</head>
<body><header>
  <h1>Campus Luxe Bags</h1>
  <p>Trendy. Affordable. Campus Ready.</p>
</header><div class="container">
  <h2>🔥 Hot Picks</h2>  <div class="products"><div class="card">
  <img src="https://via.placeholder.com/300" alt="Bag 1">
  <div class="card-content">
    <span class="badge">Popular</span>
    <h3>Minimalist Tote Bag</h3>
    <p class="price">₹150</p>
    <a class="btn" href="https://wa.me/260971087663?text=Hi%2C%20I%20want%20to%20order%20the%20Minimalist%20Tote%20Bag">Order on WhatsApp</a>
  </div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300" alt="Bag 2">
  <div class="card-content">
    <span class="badge">New</span>
    <h3>Classic Campus Backpack</h3>
    <p class="price">₹200</p>
    <a class="btn" href="https://wa.me/260971087663?text=Hi%2C%20I%20want%20to%20order%20the%20Classic%20Campus%20Backpack">Order on WhatsApp</a>
  </div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300" alt="Bag 3">
  <div class="card-content">
    <span class="badge">Trending</span>
    <h3>Mini Chic Handbag</h3>
    <p class="price">₹120</p>
    <a class="btn" href="https://wa.me/260971087663?text=Hi%2C%20I%20want%20to%20order%20the%20Mini%20Chic%20Handbag">Order on WhatsApp</a>
  </div>
</div>

  </div>
</div><footer>
  <p>© 2026 Campus Luxe | Designed for students</p>
</footer></body>
</html>
