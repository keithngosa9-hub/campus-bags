<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Luxe Bags</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #fafafa; color: #333; }header {
  background: linear-gradient(135deg, #111, #333);
  color: white;
  padding: 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: white;
  min-width: 200px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  border-radius: 10px;
  padding: 10px;
  color: #333;
}

.dropdown:hover .dropdown-content { display: block; }

.container { padding: 20px; max-width: 1100px; margin: auto; }

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s ease;
}

.card:hover { transform: translateY(-5px); }

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-content { padding: 15px; }

.price { font-weight: 600; margin: 8px 0; }

.btn {
  display: block;
  text-align: center;
  background: #25D366;
  color: white;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 14px;
  margin-top: 8px;
}

.secondary-btn {
  display: block;
  text-align: center;
  background: #000;
  color: white;
  padding: 8px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  margin-top: 5px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #777;
}

  </style>
</head>
<body><header>
  <h1>Campus Luxe Bags</h1>
  <p>Trendy. Affordable. Campus Ready.</p>
  <p>🚚 Delivery Available | 💰 Pay on Delivery</p>  <div class="top-bar">
    <div>🛒 Cart: <span id="cart-count">0</span></div>
    <div class="dropdown">
      <span>☰ Menu</span>
      <div class="dropdown-content">
        <p><strong>Favorites</strong></p>
        <div id="favorites"></div>
        <hr>
        <p><strong>Order History</strong></p>
        <div id="history"></div>
      </div>
    </div>
  </div>
</header><div class="container">
  <h2>🔥 Hot Picks</h2>  <div class="products"><div class="card">
  <img src="https://via.placeholder.com/300">
  <div class="card-content">
    <h3>Aesthetic Campus Tote</h3>
    <p class="price">K150</p>
    <a class="btn" href="#" onclick="orderNow('Aesthetic Campus Tote')">Order</a>
    <div class="secondary-btn" onclick="addToCart('Aesthetic Campus Tote')">Add to Cart</div>
    <div class="secondary-btn" onclick="addFavorite('Aesthetic Campus Tote')">❤ Favorite</div>
  </div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/300">
  <div class="card-content">
    <h3>Minimalist Girl Backpack</h3>
    <p class="price">K200</p>
    <a class="btn" href="#" onclick="orderNow('Minimalist Girl Backpack')">Order</a>
    <div class="secondary-btn" onclick="addToCart('Minimalist Girl Backpack')">Add to Cart</div>
    <div class="secondary-btn" onclick="addFavorite('Minimalist Girl Backpack')">❤ Favorite</div>
  </div>
</div>

  </div>
</div><footer>
  <p>© 2026 Campus Luxe</p>
</footer><script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let history = JSON.parse(localStorage.getItem('history')) || [];

function updateUI() {
  document.getElementById('cart-count').innerText = cart.length;

  document.getElementById('favorites').innerHTML = favorites.map(f => `<p>${f}</p>`).join('');
  document.getElementById('history').innerHTML = history.map(h => `<p>${h}</p>`).join('');
}

function addToCart(item) {
  cart.push(item);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateUI();
}

function addFavorite(item) {
  favorites.push(item);
  localStorage.setItem('favorites', JSON.stringify(favorites));
  updateUI();
}

function orderNow(item) {
  history.push(item);
  localStorage.setItem('history', JSON.stringify(history));
  window.open(`https://wa.me/260971087663?text=Hi%2C%20I%20want%20to%20order%20${item}`);
}

updateUI();
</script></body>
</html>
